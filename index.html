<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
.container{max-width:400px;margin:100px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
input,button{width:100%;padding:10px;margin:10px 0}
button{background:#007bff;color:#fff;border:none}
</style>
</head>
<body>
<div class="container">
<h2>Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<select id="role">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>
<button onclick="login()">Login</button>
</div>

<script>
function login(){
const role=document.getElementById('role').value;
localStorage.setItem('role',role);
if(role==='admin') window.location='admin.html';
else window.location='request.html';
}
</script>
</body>
</html>
