<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./css/style.css">
<title>Server Room Dashboard</title>
<style>
body { font-family: Arial; background:#e9ecef; margin:0; }
.container { margin:20px auto; }
.request-card { background:#fff; padding:10px; margin-top:10px; border-radius:8px; }
button { padding:8px; margin:5px; border:none; cursor:pointer; }
.accept { background:green; color:#fff; }
.reject { background:red; color:#fff; }
.logout { background:#007bff; color:#fff; }
</style>
</head>
<body>
     <header class="header">
        <nav class="nav">
            <div class="logo" data-editable="logo-text">Rite Foods</div>
             <ul class="nav-links">
                <li><a href="request.html">Request</a></li>
                <li><a href="index.html">Admin</a></li>
            </ul>
        </nav>
    </header>
<div class="container">
<h2>Server Room Notifications</h2>
<div id="requests"></div>
</div>

<script>
// Clear old notifications on page load (refresh)
window.onload = function () {
    let requests = JSON.parse(localStorage.getItem('requests')) || [];

    // Keep only the latest request
    if (requests.length > 0) {
        const latestRequest = [requests[requests.length - 1]];
        localStorage.setItem('requests', JSON.stringify(latestRequest));
    } else {
        localStorage.removeItem('requests');
    }

    loadRequests();
};

function loadRequests() {
    const requestsDiv = document.getElementById('requests');
    let requests = JSON.parse(localStorage.getItem('requests')) || [];

    requestsDiv.innerHTML = '';

    requests.forEach(req => {
        const div = document.createElement('div');
        div.className = 'request-card';

        div.innerHTML = `
            <strong>${req.name}</strong> (${req.company})<br>
            Dept: ${req.department}<br>
            Purpose: ${req.purpose}<br>
            Login Time: ${req.loginTime}<br>
            Duration: ${req.duration} hour(s)<br>
            Date: ${req.date}<br>
            Status: ${req.status}<br>
            <button class="accept" onclick="updateStatus(${req.id}, 'Accepted')">Accept</button>
            <button class="reject" onclick="updateStatus(${req.id}, 'Rejected')">Reject</button>
            <button class="logout" onclick="updateStatus(${req.id}, 'Logged Out')">Log Out</button>
        `;

        requestsDiv.appendChild(div);
    });
}

function updateStatus(id, status) {
    let requests = JSON.parse(localStorage.getItem('requests')) || [];

    requests = requests.map(r => {
        if (r.id === id) r.status = status;
        return r;
    });

    localStorage.setItem('requests', JSON.stringify(requests));
    loadRequests();
}

// Optional: refresh UI every 2 seconds
setInterval(loadRequests, 2000);
</script>
<footer class="footer" style="text-align: center;">
        <p data-editable="footer-text">&copy; 2026 Brand. All rights reserved.</p>
</footer>
</body>
</html>
