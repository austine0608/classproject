<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./css/style.css">
<title>Request Access</title>
<style>
.container { background:white; padding:20px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.2); }
input, button { width:100%; padding:10px; margin:8px 0; }
button { background:#007bff; color:#fff; border:none; cursor:pointer; }
button:hover { background:#0056b3; }
</style>
</head><br><br>
<body>
     <header class="header">
        <nav class="nav">
            <div class="logo" data-editable="logo-text">Rite Foods</div>
           <ul class="nav-links">
                <li><a href="request.html">Request</a></li>
                <li><a href="admin.html">Admin</a></li>
           </ul>
        </nav>
    </header>
<div class="container">
<h2 style="text-align:center">Server Room Access Form</h2>
<form id="requestForm">
<input type="text" id="name" placeholder="Name" required>
<input type="text" id="company" placeholder="Company Name" required>
<input type="text" id="department" placeholder="Department" required>
<input type="text" id="purpose" placeholder="Purpose" required>
<input type="time" id="loginTime" required>
<input type="number" id="duration" placeholder="Duration (hours)" required>
<input type="date" id="date" required>
<button type="submit">Submit Request</button>
<h2>Thank You</h2>
</form>
</div>

<script>
const form = document.getElementById('requestForm');

form.addEventListener('submit', function(e) {
    e.preventDefault();

    const request = {
        id: Date.now(),
        name: document.getElementById('name').value,
        company: document.getElementById('company').value,
        department: document.getElementById('department').value,
        purpose: document.getElementById('purpose').value,
        loginTime: document.getElementById('loginTime').value,
        duration: document.getElementById('duration').value,
        date: document.getElementById('date').value,
        status: 'Pending'
    };

    let requests = JSON.parse(localStorage.getItem('requests')) || [];
    requests.push(request);
    localStorage.setItem('requests', JSON.stringify(requests));

    alert('Request submitted! Notification sent to server room.');
    form.reset();
});
</script>
<footer class="footer" style="text-align: center;">
        <p data-editable="footer-text">&copy; 2026 Brand. All rights reserved.</p>
</footer>
</body>
</html>
