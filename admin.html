<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;margin:0}
.sidebar{width:200px;background:#343a40;height:100vh;position:fixed;color:#fff;padding:20px}
.sidebar a{display:block;color:#fff;margin:10px 0}
.main{margin-left:220px;padding:20px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:8px}
button{padding:8px;margin:5px}
.approve{background:green;color:#fff}
.reject{background:red;color:#fff}
</style>
</head>
<body>
<div class="sidebar">
<h3>Admin</h3>
<a href="admin.html">Dashboard</a>
</div>
<div class="main">
<h2>Real-Time Requests</h2>
<div id="list"></div>
</div>

<script>
window.addEventListener('storage',load);

function load(){
let data=JSON.parse(localStorage.getItem('requests'))||[];
const list=document.getElementById('list');
list.innerHTML='';

data.filter(r=>r.status==='Pending').forEach(r=>{
let div=document.createElement('div');
div.className='card';
div.innerHTML=`
<b>${r.name}</b><br>
${r.purpose}<br>
<button class='approve' onclick="update(${r.id},'Approved')">Approve</button>
<button class='reject' onclick="update(${r.id},'Rejected')">Reject</button>
`;
list.appendChild(div);
});
}

function update(id,status){
let data=JSON.parse(localStorage.getItem('requests'))||[];
data=data.map(r=>{if(r.id===id) r.status=status; return r});
localStorage.setItem('requests',JSON.stringify(data));

// EMAIL SIMULATION
alert('Email sent: Request '+status);

load();
}

load();
</script>
</body>
</html>
